<!DOCTYPE html>
<html>
<head>

<title>QR Attendance Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* BODY */

body{
background:linear-gradient(135deg,#7C3AED,#A855F7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CONTAINER */

.container{
background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* TITLE */

h2{
color:#4C1D95;
margin-bottom:20px;
font-size:22px;
}

/* QR READER */

#reader{
width:100%;
max-width:320px;
aspect-ratio:1/1;
margin:auto;
border:3px solid #6C2BD9;
border-radius:12px;
overflow:hidden;
}

/* FORCE VIDEO TO FIT */

#reader video{
width:100% !important;
height:100% !important;
object-fit:cover;
}

/* STATUS */

.status{
margin-top:18px;
font-weight:bold;
color:#6C2BD9;
font-size:15px;
}

/* LOADER */

.loader{
border:5px solid #f3f3f3;
border-top:5px solid #6C2BD9;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
margin:15px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* UPLOAD SECTION */

.upload{
margin-top:25px;
}

.upload h3{
color:#4C1D95;
margin-bottom:10px;
font-size:18px;
}

/* FILE INPUT */

input[type=file]{
padding:10px;
border-radius:6px;
border:1px solid #ddd;
width:100%;
}

/* MOBILE RESPONSIVE */

@media (max-width:600px){

.container{
padding:20px;
max-width:350px;
}

#reader{
max-width:260px;
}

h2{
font-size:20px;
}

.upload h3{
font-size:16px;
}

.status{
font-size:14px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Scan Participant QR Code</h2>

<div id="reader"></div>

<p class="status" id="status">Waiting for QR Scan...</p>

<div id="loader" class="loader"></div>

<div class="upload">

<h3>OR Upload QR Image</h3>

<input type="file" id="qrImage" accept="image/*">

</div>

</div>

<script>

/* GOOGLE SCRIPT API */

const apiURL =
"https://script.google.com/macros/s/AKfycbzV9OhNFOTCypB1JsV1WOF8j_q16urcYx9i2Rq8nnKOC1pcE_yQ_CKFrMkBp8Tf_Ed8hA/exec";

/* QR SUCCESS FUNCTION */

function onScanSuccess(decodedText){

document.getElementById("status").innerText =
"QR Detected: " + decodedText;

document.getElementById("loader").style.display="block";

fetch(apiURL + "?regId=" + decodedText)

.then(res => res.text())

.then(data => {

document.getElementById("loader").style.display="none";

document.getElementById("status").innerText = data;

alert(data);

})

.catch(err => {

document.getElementById("loader").style.display="none";

document.getElementById("status").innerText =
"Error marking attendance";

console.error(err);

});

}

/* START CAMERA */

function startScanner(){

Html5Qrcode.getCameras()

.then(devices => {

if(devices && devices.length){

let cameraId = devices[0].id;

/* TRY TO FIND BACK CAMERA */

devices.forEach(device => {

if(device.label.toLowerCase().includes("back") ||
   device.label.toLowerCase().includes("rear") ||
   device.label.toLowerCase().includes("environment"))
{
cameraId = device.id;
}

});

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
cameraId,
{
fps:10,
qrbox:function(viewfinderWidth, viewfinderHeight){

let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
let qrboxSize = Math.floor(minEdge * 0.8);

return { width: qrboxSize, height: qrboxSize };

}
},
onScanSuccess
);

}else{

document.getElementById("status").innerText =
"No camera found";

}

})

.catch(err => {

document.getElementById("status").innerText =
"Camera permission denied";

console.error(err);

});

}

startScanner();

/* IMAGE UPLOAD */

document.getElementById("qrImage")
.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const html5QrCode = new Html5Qrcode("reader");

document.getElementById("loader").style.display="block";

html5QrCode.scanFile(file,true)

.then(decodedText => {

document.getElementById("loader").style.display="none";

onScanSuccess(decodedText);

})

.catch(err => {

document.getElementById("loader").style.display="none";

alert("QR not detected in image");

});

});

</script>

</body>
</html>
