<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
if(localStorage.getItem("admin") !== "true"){
window.location.href="admin-login.html";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* BODY */

body{
background:linear-gradient(135deg,#7C3AED,#A855F7);
min-height:100vh;
padding:20px;
}

/* HEADER */

.header{
background:#4C1D95;
color:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.header h2{
font-size:22px;
}

.header div{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.header button{
padding:10px 15px;
border:none;
background:#6C2BD9;
color:white;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.header button:hover{
background:#4C1D95;
}

/* CARDS */

.cards{
display:flex;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
flex:1;
min-width:180px;
text-align:center;
}

.card h3{
color:#4C1D95;
margin-bottom:10px;
}

/* CHART */

.chart-container{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
margin-bottom:25px;
width:100%;
}

/* SEARCH */

.search{
margin-bottom:20px;
}

.search input{
padding:10px;
width:100%;
max-width:350px;
border-radius:6px;
border:1px solid #ccc;
}

/* TABLE */

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
min-width:600px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#4C1D95;
color:white;
}

tr:hover{
background:#F3E8FF;
}

/* MOBILE */

@media(max-width:768px){

.header{
flex-direction:column;
align-items:flex-start;
}

.header h2{
font-size:20px;
}

.cards{
flex-direction:column;
}

.card{
width:100%;
}

.search input{
width:100%;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h2>Event Admin Dashboard</h2>

<div>
<button onclick="openScanner()">Open QR Scanner</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<h3>Total Registrations</h3>
<p id="totalReg">0</p>
</div>

<div class="card">
<h3>Attendance</h3>
<p id="attendance">0</p>
</div>

<div class="card">
<h3>Certificates</h3>
<p id="certs">0</p>
</div>

</div>

<!-- CHART -->

<div class="chart-container">
<canvas id="eventChart"></canvas>
</div>

<!-- SEARCH -->

<div class="search">
<input type="text" id="search" placeholder="Search participant...">
</div>

<!-- TABLE -->

<div class="table-container">

<table id="dataTable">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Organization</th>
<th>Event</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const apiURL =
"https://script.google.com/macros/s/AKfycbzV9OhNFOTCypB1JsV1WOF8j_q16urcYx9i2Rq8nnKOC1pcE_yQ_CKFrMkBp8Tf_Ed8hA/exec";

/* ANALYTICS */

fetch(apiURL + "?type=analytics")
.then(res => res.json())
.then(data => {

document.getElementById("totalReg").innerText =
data.totalRegistrations;

document.getElementById("attendance").innerText =
data.totalPresent;

document.getElementById("certs").innerText =
data.certificatesGenerated;

const ctx = document.getElementById('eventChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: Object.keys(data.eventStats),
datasets: [{
label: 'Participants',
data: Object.values(data.eventStats),
backgroundColor:'#6C2BD9'
}]
}
});

});

/* LOAD TABLE */

fetch(apiURL)
.then(res => res.json())
.then(data => {

const table = document.querySelector("#dataTable tbody");

data.forEach(row => {

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${row.name}</td>
<td>${row.email}</td>
<td>${row.phone}</td>
<td>${row.organization}</td>
<td>${row.event}</td>
`;

table.appendChild(tr);

});

});

/* SEARCH */

document.getElementById("search")
.addEventListener("keyup", function(){

let filter = this.value.toLowerCase();

document.querySelectorAll("#dataTable tbody tr")
.forEach(row => {

row.style.display =
row.innerText.toLowerCase().includes(filter)
? "" : "none";

});

});

/* BUTTONS */

function openScanner(){
window.location.href="scanner.html";
}

function logout(){
localStorage.removeItem("admin");
window.location.href="admin-login.html";
}

</script>

</body>
</html>
